<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 900" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Helvetica, Arial, sans-serif">
  <title id="title">ssuAgent orchestration and deployment architecture</title>
  <desc id="desc">A trusted Vercel server route verifies bearer identity when present and calls FastAPI with a server-only key. FastAPI binds principal, session, or anonymous thread ownership; runs a LangGraph supervisor and domain agents; persists checkpoints in PostgreSQL; calls ssuMCP over MCP; and falls back across configured LLM providers.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2328"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#059669"/>
    </marker>
  </defs>

  <rect width="1480" height="900" fill="#ffffff"/>
  <text x="42" y="45" font-size="24" font-weight="750" fill="#0f172a">ssuAgent · Orchestration architecture</text>
  <text x="42" y="71" font-size="13" fill="#64748b">Trusted identity, durable conversation state, explicit domain routing, and human approval around write actions.</text>

  <!-- Browser -->
  <g>
    <rect x="42" y="184" width="208" height="426" rx="12" fill="#ffffff" stroke="#1e3a5f" stroke-width="2"/>
    <path d="M42 196 a12 12 0 0 1 12 -12 h184 a12 12 0 0 1 12 12 v52 H42 z" fill="#0f4c81"/>
    <rect x="62" y="201" width="42" height="27" rx="3" fill="none" stroke="#ffffff" stroke-width="2.2"/>
    <path d="M57 234 h52 l-5 7 H62 z" fill="#ffffff"/>
    <text x="119" y="213" font-size="14.5" font-weight="700" fill="#ffffff">ssuAI browser</text>
    <text x="119" y="233" font-size="11.3" fill="#dbeafe">chat UI · same origin</text>

    <rect x="64" y="272" width="164" height="74" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="82" y="298" font-size="12.5" font-weight="700" fill="#1e40af">Conversation request</text>
    <text x="82" y="321" font-size="10.8" fill="#475569">message · thread_id</text>
    <text x="82" y="338" font-size="10.8" fill="#475569">MCP session · bearer</text>

    <rect x="64" y="371" width="164" height="82" rx="8" fill="#faf5ff" stroke="#c4b5fd"/>
    <text x="82" y="397" font-size="12.5" font-weight="700" fill="#5b21b6">SSE event stream</text>
    <text x="82" y="420" font-size="10.8" fill="#475569">text · handoff · tool</text>
    <text x="82" y="438" font-size="10.8" fill="#475569">interrupt · done</text>

    <rect x="64" y="478" width="164" height="104" rx="8" fill="#fff7ed" stroke="#fb923c"/>
    <circle cx="86" cy="504" r="10" fill="#f97316"/>
    <path d="M86 499 v7 M86 511 v1" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <text x="104" y="508" font-size="12.5" font-weight="700" fill="#9a3412">HITL approval</text>
    <text x="82" y="532" font-size="10.8" fill="#475569">prepare_* pauses graph</text>
    <text x="82" y="550" font-size="10.8" fill="#475569">approve / deny</text>
    <text x="82" y="568" font-size="10.8" fill="#475569">POST /agent/resume</text>
  </g>

  <!-- Vercel proxy trust boundary -->
  <g>
    <rect x="288" y="184" width="250" height="426" rx="12" fill="#ffffff" stroke="#111827" stroke-width="2"/>
    <rect x="288" y="184" width="250" height="64" rx="12" fill="#111827"/>
    <rect x="288" y="232" width="250" height="16" fill="#111827"/>
    <path d="M319 202 l15 26 h-30 z" fill="#ffffff"/>
    <text x="351" y="211" font-size="14.5" font-weight="700" fill="#ffffff">Vercel server</text>
    <text x="351" y="231" font-size="11.3" fill="#d1d5db">trusted ssuAI proxy</text>

    <rect x="313" y="276" width="200" height="89" rx="8" fill="#eff6ff" stroke="#60a5fa"/>
    <text x="333" y="302" font-size="12.6" font-weight="700" fill="#1e40af">/api/agent/*</text>
    <text x="333" y="326" font-size="10.8" fill="#475569">same-origin stream + resume</text>
    <text x="333" y="345" font-size="10.8" fill="#475569">body principal is discarded</text>

    <rect x="313" y="390" width="200" height="91" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/>
    <rect x="331" y="408" width="20" height="16" rx="2" fill="#059669"/>
    <path d="M335 408 v-4 a6 6 0 0 1 12 0 v4" fill="none" stroke="#059669" stroke-width="2"/>
    <text x="362" y="422" font-size="12.6" font-weight="700" fill="#065f46">Verify identity</text>
    <text x="333" y="447" font-size="10.8" fill="#475569">bearer → ssuMCP /auth/me</text>
    <text x="333" y="466" font-size="10.8" fill="#475569">inject verified stable principal</text>

    <rect x="313" y="507" width="200" height="76" rx="8" fill="#faf5ff" stroke="#a78bfa"/>
    <text x="333" y="533" font-size="12.6" font-weight="700" fill="#5b21b6">Server credential</text>
    <text x="333" y="556" font-size="10.8" fill="#475569">inject X-Agent-Key</text>
    <text x="333" y="574" font-size="10.8" fill="#475569">never shipped to browser</text>
  </g>

  <!-- k3s boundary -->
  <g>
    <rect x="582" y="112" width="580" height="658" rx="12" fill="#f8fafc" stroke="#326ce5" stroke-width="2.2"/>
    <rect x="582" y="112" width="38" height="38" fill="#326ce5"/>
    <path d="M590 131 l11 -7 11 7 v12 h-22 z M601 124 v19" fill="none" stroke="#ffffff" stroke-width="1.6"/>
    <text x="632" y="137" font-size="15" font-weight="700" fill="#1e3a8a">k3s · ssuai-prod</text>
    <text x="1134" y="137" text-anchor="end" font-size="11" fill="#475569">1 replica · 100–500m CPU · 256–512Mi</text>

    <rect x="611" y="171" width="238" height="62" rx="9" fill="#ffffff" stroke="#8b5cf6"/>
    <rect x="628" y="186" width="32" height="32" rx="7" fill="#8b5cf6"/>
    <path d="M635 202 h18 M644 193 v18" stroke="#ffffff" stroke-width="2"/>
    <text x="675" y="196" font-size="12.8" font-weight="700" fill="#0f172a">Traefik HTTPS ingress</text>
    <text x="675" y="216" font-size="10.7" fill="#475569">ssuagent.duckdns.org</text>

    <!-- FastAPI pod -->
    <rect x="611" y="257" width="359" height="478" rx="11" fill="#ffffff" stroke="#059669" stroke-width="2.2"/>
    <rect x="611" y="257" width="359" height="58" rx="11" fill="#ecfdf5"/>
    <rect x="611" y="301" width="359" height="14" fill="#ecfdf5"/>
    <path d="M638 270 l15 0 -8 14 h12 l-22 20 7 -15 h-11 z" fill="#009688"/>
    <text x="672" y="281" font-size="14.5" font-weight="750" fill="#065f46">FastAPI · Python 3.12</text>
    <text x="672" y="301" font-size="10.8" fill="#475569">POST /agent/stream · /agent/resume</text>

    <rect x="634" y="338" width="313" height="56" rx="8" fill="#fff7ed" stroke="#fb923c"/>
    <text x="790" y="360" text-anchor="middle" font-size="12.4" font-weight="700" fill="#9a3412">Request gate</text>
    <text x="790" y="379" text-anchor="middle" font-size="10.7" fill="#475569">API key · CORS · size cap · process-local ingress limit</text>

    <rect x="634" y="413" width="313" height="63" rx="8" fill="#eff6ff" stroke="#60a5fa"/>
    <text x="790" y="437" text-anchor="middle" font-size="12.4" font-weight="700" fill="#1e40af">Thread ownership gate</text>
    <text x="790" y="457" text-anchor="middle" font-size="10.7" fill="#475569">sha256(principal) or session owner · mismatch → 403</text>

    <rect x="634" y="496" width="313" height="77" rx="9" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.6"/>
    <circle cx="675" cy="534" r="18" fill="#7c3aed"/>
    <circle cx="669" cy="534" r="3" fill="#ffffff"/>
    <circle cx="681" cy="527" r="3" fill="#ffffff"/>
    <circle cx="681" cy="541" r="3" fill="#ffffff"/>
    <path d="M672 533 l7 -4 M672 536 l7 4" stroke="#ffffff" stroke-width="1.7"/>
    <text x="708" y="526" font-size="13" font-weight="750" fill="#5b21b6">LangGraph Supervisor</text>
    <text x="708" y="547" font-size="10.8" fill="#475569">explicit route marker → domain subgraph</text>
    <text x="708" y="565" font-size="10.4" fill="#64748b">astream_events v2 → filtered SSE</text>

    <rect x="634" y="594" width="94" height="65" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="681" y="620" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e40af">Academic</text>
    <text x="681" y="640" text-anchor="middle" font-size="9.9" fill="#475569">grades · policy</text>
    <rect x="743" y="594" width="94" height="65" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="790" y="620" text-anchor="middle" font-size="11.5" font-weight="700" fill="#065f46">Library</text>
    <text x="790" y="640" text-anchor="middle" font-size="9.9" fill="#475569">seat · HITL</text>
    <rect x="852" y="594" width="95" height="65" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="899" y="620" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9a3412">LMS</text>
    <text x="899" y="640" text-anchor="middle" font-size="9.9" fill="#475569">courses · export</text>

    <path d="M790 573 V586" stroke="#7c3aed" stroke-width="2.3"/>
    <path d="M681 586 H899" stroke="#7c3aed" stroke-width="2.3"/>
    <path d="M681 586 V594 M790 586 V594 M899 586 V594" stroke="#7c3aed" stroke-width="2.3"/>

    <rect x="634" y="681" width="313" height="34" rx="7" fill="#111827"/>
    <text x="790" y="703" text-anchor="middle" font-size="11.5" font-weight="650" fill="#ffffff">MCP client · dynamic tools · one retry on transport failure</text>

    <!-- Stateful dependencies -->
    <rect x="997" y="257" width="137" height="150" rx="9" fill="#eef4fb" stroke="#3b82f6"/>
    <path d="M1022 287 a31 10 0 0 1 62 0 v36 a31 10 0 0 1 -62 0 z" fill="#2e73b8"/>
    <ellipse cx="1053" cy="287" rx="31" ry="10" fill="#5b96cf"/>
    <text x="1065" y="349" text-anchor="middle" font-size="12.4" font-weight="700" fill="#1e40af">PostgreSQL</text>
    <text x="1065" y="371" text-anchor="middle" font-size="10.3" fill="#475569">LangGraph checkpoints</text>
    <text x="1065" y="388" text-anchor="middle" font-size="10.3" fill="#475569">thread_owners</text>

    <rect x="997" y="433" width="137" height="106" rx="9" fill="#fff7ed" stroke="#fb923c"/>
    <text x="1065" y="459" text-anchor="middle" font-size="12.2" font-weight="700" fill="#9a3412">Runtime constraint</text>
    <text x="1065" y="478" text-anchor="middle" font-size="10.1" fill="#475569">limiter sees proxy egress</text>
    <text x="1065" y="495" text-anchor="middle" font-size="10.1" fill="#475569">process-local · 1 replica</text>
    <text x="1065" y="512" text-anchor="middle" font-size="10.1" fill="#475569">scale-out needs trusted IP</text>
    <text x="1065" y="529" text-anchor="middle" font-size="10.1" fill="#475569">forwarding + shared store</text>

    <rect x="997" y="565" width="137" height="109" rx="9" fill="#f5f3ff" stroke="#8b5cf6"/>
    <rect x="1031" y="584" width="29" height="23" rx="3" fill="#7c3aed"/>
    <path d="M1036 584 v-6 a9 9 0 0 1 18 0 v6" fill="none" stroke="#7c3aed" stroke-width="2.4"/>
    <text x="1065" y="625" text-anchor="middle" font-size="12.2" font-weight="700" fill="#5b21b6">Kubernetes Secret</text>
    <text x="1065" y="647" text-anchor="middle" font-size="10.3" fill="#475569">agent key · DB URL</text>
    <text x="1065" y="664" text-anchor="middle" font-size="10.3" fill="#475569">configured provider keys</text>
  </g>

  <!-- External dependencies -->
  <g>
    <rect x="1202" y="184" width="236" height="230" rx="11" fill="#ffffff" stroke="#6db33f" stroke-width="2"/>
    <circle cx="1243" cy="230" r="25" fill="#6db33f"/>
    <path d="M1243 216 v13 M1233 224 a14 14 0 1 0 20 0" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <text x="1280" y="225" font-size="15" font-weight="750" fill="#14532d">ssuMCP</text>
    <text x="1280" y="246" font-size="10.8" fill="#475569">Spring Boot · /mcp</text>
    <rect x="1227" y="278" width="186" height="46" rx="7" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="1320" y="297" text-anchor="middle" font-size="11.5" font-weight="700" fill="#065f46">Streamable HTTP MCP</text>
    <text x="1320" y="314" text-anchor="middle" font-size="9.9" fill="#475569">public + private campus tools</text>
    <rect x="1227" y="339" width="186" height="48" rx="7" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="1320" y="359" text-anchor="middle" font-size="11.3" font-weight="700" fill="#1e40af">/api/auth/me</text>
    <text x="1320" y="376" text-anchor="middle" font-size="9.9" fill="#475569">server-side principal verification</text>

    <rect x="1202" y="445" width="236" height="218" rx="11" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.8" stroke-dasharray="7 5"/>
    <text x="1227" y="475" font-size="14" font-weight="700" fill="#5b21b6">Configured LLM fallback</text>
    <rect x="1227" y="497" width="186" height="30" rx="15" fill="#ede9fe"/>
    <text x="1320" y="517" text-anchor="middle" font-size="10.8" fill="#5b21b6">Anthropic · optional first</text>
    <rect x="1227" y="538" width="186" height="30" rx="15" fill="#ede9fe"/>
    <text x="1320" y="558" text-anchor="middle" font-size="10.8" fill="#5b21b6">Groq · Llama 3.3</text>
    <rect x="1227" y="579" width="186" height="30" rx="15" fill="#ede9fe"/>
    <text x="1320" y="599" text-anchor="middle" font-size="10.8" fill="#5b21b6">Gemini</text>
    <rect x="1227" y="620" width="186" height="30" rx="15" fill="#ede9fe"/>
    <text x="1320" y="640" text-anchor="middle" font-size="10.8" fill="#5b21b6">OpenRouter</text>
  </g>

  <!-- Runtime paths -->
  <path d="M250 315 H305" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="271" y="303" text-anchor="middle" font-size="10.5" font-weight="650" fill="#2563eb">POST</text>
  <path d="M538 319 C568 319 570 202 603 202" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <path d="M730 233 V249" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="790" y="247" text-anchor="middle" font-size="10.8" font-weight="650" fill="#2563eb">X-Agent-Key + optional verified principal</text>

  <path d="M611 332 C560 332 562 407 538 407" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <path d="M288 407 H250" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <text x="548" y="387" font-size="10.8" font-weight="650" fill="#7c3aed">SSE</text>

  <path d="M970 444 H989" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <path d="M947 698 H1180 V300 H1194" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="1080" y="690" text-anchor="middle" font-size="10.8" font-weight="650" fill="#059669">MCP tools/call</text>
  <path d="M947 534 V552 H1194" fill="none" stroke="#7c3aed" stroke-width="2.7" stroke-dasharray="7 5" marker-end="url(#arrowPurple)"/>
  <text x="1080" y="545" text-anchor="middle" font-size="10.5" fill="#7c3aed">model + tool loop</text>
  <path d="M513 436 C555 436 540 103 650 103 H1424 V363 H1413" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="902" y="95" text-anchor="middle" font-size="10.5" fill="#64748b">bearer verification only · bearer is never sent to ssuAgent</text>

  <!-- Delivery footer -->
  <g>
    <rect x="42" y="803" width="1396" height="62" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="64" y="818" width="34" height="34" rx="7" fill="#2088ff"/>
    <circle cx="76" cy="830" r="5" fill="none" stroke="#ffffff" stroke-width="1.7"/>
    <circle cx="88" cy="840" r="3" fill="none" stroke="#ffffff" stroke-width="1.7"/>
    <path d="M76 835 v4 h9" stroke="#ffffff" stroke-width="1.7" fill="none"/>
    <text x="111" y="830" font-size="12.3" font-weight="700" fill="#0f172a">GitHub Actions</text>
    <text x="111" y="849" font-size="10.6" fill="#475569">ruff · pytest · ARM64 image</text>
    <path d="M302 834 H379" fill="none" stroke="#1f2328" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="395" y="830" font-size="12.3" font-weight="700" fill="#0f172a">GHCR</text>
    <text x="395" y="849" font-size="10.6" fill="#475569">sha-&lt;commit&gt;</text>
    <path d="M499 834 H576" fill="none" stroke="#1f2328" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="592" y="830" font-size="12.3" font-weight="700" fill="#0f172a">Image Updater</text>
    <text x="592" y="849" font-size="10.6" fill="#475569">Git write-back</text>
    <path d="M730 834 H807" fill="none" stroke="#1f2328" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="823" y="830" font-size="12.3" font-weight="700" fill="#0f172a">ArgoCD</text>
    <text x="823" y="849" font-size="10.6" fill="#475569">auto-sync · self-heal</text>
    <path d="M957 834 H1034" fill="none" stroke="#1f2328" stroke-width="2.2" marker-end="url(#arrow)"/>
    <text x="1050" y="830" font-size="12.3" font-weight="700" fill="#0f172a">Helm rollout</text>
    <text x="1050" y="849" font-size="10.6" fill="#475569">one ssu-agent pod</text>
    <text x="1408" y="839" text-anchor="end" font-size="10.6" fill="#64748b">No Redis dependency; PostgreSQL persists graph state.</text>
