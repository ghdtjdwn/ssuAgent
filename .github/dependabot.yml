version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      python-minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: chore(deps)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: chore(deps)
      include: scope

# Major versions remain separate PRs for compatibility review. Security updates
# are filed outside the weekly version-update schedule.
