# Copy this to create the actual k8s secret (DO NOT commit with real values):
#
# kubectl create secret generic ssuagent-secrets \
#   --namespace ssuai-prod \
#   --from-literal=GOOGLE_API_KEY=<gemini-api-key> \
#   --from-literal=AGENT_API_KEY=<same-random-value-as-ssuAI> \
#   --from-literal=DATABASE_URL="postgresql://ssuai:<db-password>@postgres-service:5432/ssuai"
#
# The DATABASE_URL password is the same as SSUAI_DB_PASSWORD in ssuai-backend-secrets.
#
# Provider keys are optional individually, but configure at least one. Keys are
# injected through envFrom and omitted providers are skipped:
#   ANTHROPIC_API_KEY   — optional first provider
#   GROQ_API_KEY        — fallback provider
#   GOOGLE_API_KEY      — fallback provider
#   OPENROUTER_API_KEY  — final fallback provider
{{- if .Values.secretTemplate.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretRef.name }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  {{- toYaml .Values.secretTemplate.stringData | nindent 2 }}
{{- end }}
